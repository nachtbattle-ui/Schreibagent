<!DOCTYPE html>

<html lang="de"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonas · Toolbox</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
.sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100vh; background: #111; border-right: 1px solid #1f1f1f; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
.sidebar-logo { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid #1f1f1f; }
.sidebar-logo span { color: #555; font-weight: 400; font-size: 12px; display: block; margin-top: 2px; }
.volume-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.volume-icon { font-size: 14px; cursor: pointer; user-select: none; flex-shrink: 0; }
#volumeSlider { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: #2a2a2a; outline: none; cursor: pointer; }
#volumeSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #555; cursor: pointer; transition: background 0.15s; }
#volumeSlider::-webkit-slider-thumb:hover { background: #e0e0e0; }
.nav-item { padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #555; cursor: pointer; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; display: flex; align-items: center; gap: 8px; }
.nav-item:hover { background: #1a1a1a; color: #aaa; }
.nav-item.active { background: #1f1f1f; color: #e0e0e0; }
.sidebar-section { font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 12px 4px; margin-top: 8px; border-top: 1px solid #1a1a1a; }
.project-item { display: flex; align-items: center; gap: 4px; padding: 5px 8px; border-radius: 6px; background: #0f0f0f; border: 1px solid #1a1a1a; margin-bottom: 2px; }
.project-item-name { font-size: 11px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.project-item-name:hover { color: #aaa; }
.project-item-name.active-project { color: #6a9a6a; }
.project-item-btn { background: none; border: none; color: #333; cursor: pointer; font-size: 11px; padding: 1px 3px; flex-shrink: 0; }
.project-item-btn:hover { color: #c44; }

/* PROJECT MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 14px; padding: 1.5rem; width: 420px; max-width: 90vw; }
.modal-title { font-size: 14px; font-weight: 600; color: #e0e0e0; margin-bottom: 1rem; }
.modal-input { width: 100%; font-size: 14px; font-family: inherit; background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 8px; padding: 9px 12px; color: #e0e0e0; margin-bottom: 1rem; }
.modal-input:focus { outline: none; border-color: #333; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-empty { font-size: 13px; color: #333; text-align: center; padding: 1rem 0; }
.project-list-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; border: 1px solid #1f1f1f; background: #0f0f0f; margin-bottom: 6px; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
.project-list-item:hover { border-color: #2a3a2a; }
.project-list-info { flex: 1; }
.project-list-name { font-size: 13px; color: #ccc; margin-bottom: 2px; }
.project-list-meta { font-size: 11px; color: #444; }
.project-list-del { background: none; border: none; color: #333; cursor: pointer; font-size: 16px; }
.project-list-del:hover { color: #c44; }

/* LAYOUT */
.main { margin-left: 200px; padding: 2rem 2.5rem; max-width: 900px; }
.folien-layout { position: fixed; left: 200px; right: 0; top: 0; bottom: 0; display: flex; overflow: hidden; }
.folien-left { flex: 1; min-width: 0; padding: 2rem 1.5rem 2rem 2rem; overflow-y: auto; }
.folien-right { width: 380px; flex-shrink: 0; border-left: 1px solid #1a1a1a; background: #0d0d0d; display: flex; flex-direction: column; }
.chat-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #2a2a2a; text-align: center; padding: 2rem; }
.chat-placeholder-icon { font-size: 32px; }
.chat-placeholder-text { font-size: 13px; line-height: 1.6; }

/* CHAT PANEL */
.chat-header { padding: 1rem 1.25rem; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.chat-header-title { font-size: 12px; color: #666; font-weight: 500; }
.chat-header-slide { font-size: 11px; color: #3a5a3a; background: #0f1f0f; padding: 2px 8px; border-radius: 4px; }
.chat-close { background: none; border: none; color: #333; cursor: pointer; font-size: 16px; }
.chat-close:hover { color: #888; }
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 90%; font-size: 13px; line-height: 1.7; padding: 8px 12px; border-radius: 10px; }
.chat-msg.user { align-self: flex-end; background: #1f2f1f; color: #ccc; border-radius: 10px 10px 2px 10px; }
.chat-msg.ai { align-self: flex-start; background: #141414; border: 1px solid #1f1f1f; color: #ccc; border-radius: 10px 10px 10px 2px; }
.chat-msg.ai.thinking { color: #333; font-style: italic; }
.chat-input-wrap { padding: 0.75rem 1rem; border-top: 1px solid #1a1a1a; display: flex; gap: 8px; flex-shrink: 0; }
.chat-input { flex: 1; font-size: 13px; font-family: inherit; background: #111; border: 1px solid #1f1f1f; border-radius: 8px; padding: 8px 10px; color: #e0e0e0; resize: none; max-height: 80px; min-height: 36px; }
.chat-input:focus { outline: none; border-color: #2a2a2a; }
.chat-send { padding: 8px 12px; background: #e0e0e0; color: #0a0a0a; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; flex-shrink: 0; transition: background 0.15s; }
.chat-send:hover { background: #fff; }
.chat-send:disabled { background: #1f1f1f; color: #444; cursor: not-allowed; }

/* CARDS */
.card { background: #141414; border: 1px solid #1f1f1f; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.card-title { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
label { font-size: 11px; color: #444; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
textarea, select { width: 100%; font-size: 14px; font-family: inherit; border: 1px solid #1f1f1f; border-radius: 8px; padding: 9px 12px; background: #0f0f0f; color: #e0e0e0; transition: border-color 0.15s; }
textarea:focus, select:focus { outline: none; border-color: #333; }
textarea { min-height: 150px; resize: vertical; line-height: 1.7; }
select option { background: #141414; }
.grid { display: grid; gap: 10px; margin: 1rem 0; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.attr-group { display: flex; flex-direction: column; gap: 4px; }
.modus-hint { font-size: 12px; color: #444; margin-top: 8px; padding: 8px 12px; background: #0f0f0f; border-radius: 7px; border: 1px solid #1a1a1a; display: none; line-height: 1.5; }

/* BUTTONS */
.btn-primary { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; border-radius: 8px; background: #e0e0e0; color: #0a0a0a; margin-top: 0.75rem; transition: all 0.15s; }
.btn-primary:hover { background: #fff; }
.btn-primary:disabled { background: #1f1f1f; color: #444; cursor: not-allowed; }
.btn-primary.running { background: #3a1a1a; color: #e55; border: 1px solid #5a2a2a; }
.btn-primary.paused { background: #1a2a1a; color: #5a5; border: 1px solid #2a4a2a; }
.btn-secondary { padding: 7px 14px; font-size: 12px; cursor: pointer; border: 1px solid #1f1f1f; border-radius: 7px; background: transparent; color: #666; transition: all 0.15s; }
.btn-secondary:hover { background: #1a1a1a; color: #aaa; }
.btn-danger { padding: 6px 12px; font-size: 12px; cursor: pointer; border: 1px solid #3a1a1a; border-radius: 7px; background: transparent; color: #844; transition: all 0.15s; }
.btn-danger:hover { background: #1f0f0f; color: #c55; }

/* CONTROL ROW */
.action-row { display: flex; gap: 8px; margin-top: 0.75rem; }
.action-row .btn-primary { flex: 1; margin-top: 0; }
.status-bar { font-size: 12px; color: #444; margin-top: 8px; min-height: 18px; }

/* UPLOAD */
.upload-zone { border: 1px dashed #252525; border-radius: 10px; padding: 18px; text-align: center; cursor: pointer; transition: all 0.15s; }
.upload-zone:hover { border-color: #333; background: #111; }
.upload-zone.has-file { border-color: #2a4a2a; background: #0f1a0f; cursor: default; }
.upload-zone-text { font-size: 13px; color: #444; }
.upload-zone.has-file .upload-zone-text { color: #4a8a4a; }
.upload-actions { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
.pdf-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.pdf-item-wrap { display: flex; flex-direction: column; }
.pdf-item { display: flex; justify-content: space-between; align-items: center; background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 6px; padding: 6px 10px; font-size: 12px; color: #666; }
.pdf-item.range-open { border-radius: 6px 6px 0 0; }
.pdf-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
.pdf-item-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.pdf-range-toggle { background: none; border: none; color: #333; cursor: pointer; font-size: 11px; padding: 0; transition: color 0.1s; }
.pdf-range-toggle:hover { color: #888; }
.pdf-replace { background: none; border: none; color: #444; cursor: pointer; font-size: 11px; padding: 0 2px; transition: color 0.1s; }
.pdf-replace:hover { color: #aaa; }
.pdf-remove { background: none; border: none; color: #333; cursor: pointer; font-size: 14px; line-height: 1; transition: color 0.1s; }
.pdf-remove:hover { color: #c44; }
.pdf-item-range { background: #0a0a0a; border: 1px solid #1f1f1f; border-top: none; border-radius: 0 0 6px 6px; padding: 8px 10px; display: none; }
.pdf-item-range.open { display: block; }

/* PROGRESS */
.progress-wrap { margin: 1rem 0; display: none; }
.progress-label { font-size: 12px; color: #555; margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar { height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #e0e0e0; border-radius: 2px; transition: width 0.3s; }
.progress-fill.paused { background: #4a8a4a; }

/* OUTPUT */
.output-text { font-size: 14px; line-height: 1.9; color: #e0e0e0; white-space: pre-wrap; }
.output-card { display: none; }
.output-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }

/* SLIDES */
.slides-results { margin-top: 1rem; display: none; }
.slide-item { background: #141414; border: 1px solid #1f1f1f; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.slide-item:not(.orga):hover { border-color: #2a3a2a; }
.slide-item.active-chat { border-color: #3a5a3a; background: #0f180f; }
.slide-item.orga { opacity: 0.4; border-style: dashed; cursor: default; }
.slide-meta { font-size: 11px; color: #444; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.slide-num { background: #1a1a1a; color: #555; padding: 2px 7px; border-radius: 4px; font-size: 10px; }
.slide-tag { color: #3a6a3a; background: #0f1f0f; padding: 2px 7px; border-radius: 4px; font-size: 10px; }
.slide-tag.orga-tag { color: #4a4a2a; background: #1a1a0f; }
.slide-tag.grob-tag { color: #6a6a3a; background: #1a1a0f; }
.slide-text { font-size: 13.5px; line-height: 1.85; color: #ccc; }
.bullet-list { display: flex; flex-direction: column; gap: 6px; }
.bullet-point { font-size: 13.5px; line-height: 1.7; color: #ccc; padding-left: 1rem; position: relative; }
.bullet-point::before { content: '•'; position: absolute; left: 0; color: #444; }
.bullet-point .source { color: #3a5a3a; font-size: 11px; margin-left: 4px; }
.slide-chat-hint { font-size: 11px; color: #2a3a2a; margin-top: 8px; }
.slide-item:not(.orga):hover .slide-chat-hint { color: #3a5a3a; }

/* TYPING EFFECT */
.typing-cursor::after { content: '▌'; animation: blink 0.6s step-end infinite; color: #6a9a6a; font-size: 12px; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
.bullet-point.typing { color: #6a9a6a; }
.summary-block { background: #0f1a1a; border: 1px solid #1a2a2a; border-radius: 10px; padding: 1.25rem; margin-top: 1rem; cursor: pointer; }
.summary-block:hover { border-color: #2a3a3a; }
.summary-label { font-size: 11px; color: #3a6a6a; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-weight: 600; }
.summary-text { font-size: 14px; line-height: 1.9; color: #aaa; }
.results-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; gap: 8px; }
.results-count { font-size: 12px; color: #444; flex: 1; }
.results-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.topic-chip { padding: 5px 12px; font-size: 11px; border-radius: 20px; background: #141414; border: 1px solid #2a2a2a; color: #666; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.topic-chip:hover { border-color: #3a5a3a; color: #aaa; }
.topic-chip.active { background: #0f1f0f; border-color: #3a6a3a; color: #6a9a6a; }
.topic-chip.all { border-color: #2a3a2a; }
.search-wrap { display: flex; align-items: center; }
.search-wrap input { font-size: 12px; font-family: inherit; background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 7px; padding: 6px 10px; color: #e0e0e0; width: 130px; transition: border-color 0.15s; }
.search-wrap input:focus { outline: none; border-color: #333; width: 160px; }
.search-wrap input::placeholder { color: #333; }
.topic-heading { font-size: 11px; font-weight: 600; color: #3a5a3a; text-transform: uppercase; letter-spacing: 0.08em; margin: 1.5rem 0 0.5rem; padding: 6px 0; border-bottom: 1px solid #1a2a1a; display: none; }
.topic-heading.visible { display: block; }

/* RANGE SLIDER */
.range-container { margin-top: 6px; }
.range-labels { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 10px; }
.range-labels strong { color: #e0e0e0; }
.range-track { position: relative; height: 4px; background: #1f1f1f; border-radius: 2px; margin: 8px 0 16px; }
.range-selected { position: absolute; height: 100%; background: #e0e0e0; border-radius: 2px; pointer-events: none; }
.range-track input[type=range] { position: absolute; width: 100%; height: 4px; background: none; -webkit-appearance: none; pointer-events: none; top: 0; left: 0; }
.range-track input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #e0e0e0; cursor: pointer; pointer-events: all; border: 2px solid #0a0a0a; box-shadow: 0 0 0 1px #333; }
.range-track input[type=range]::-webkit-slider-thumb:hover { background: #fff; }
.range-info { font-size: 12px; color: #444; margin-top: 4px; }
.pdf-item-range .range-track { margin: 4px 0 12px; }
.pdf-item-range .range-labels { font-size: 12px; margin-bottom: 6px; }

.panel { display: none; }
.panel.active { display: block; }
.panel-folien { display: none; }
.panel-folien.active { display: flex; }
hr { border: none; border-top: 1px solid #1a1a1a; margin: 1.25rem 0; }
</style>
</head>
<body>

<div class="sidebar">
  <!-- API KEY BUTTON -->
  <button class="nav-item" onclick="openAPIKeyModal()" id="apiKeyBtn" style="margin-bottom:4px;">🔑 API-Key <span id="apiKeyStatus">✅</span></button>
  <div class="volume-wrap">
    <span class="volume-icon" id="volIcon" onclick="toggleMute()">🔊</span>
    <input type="range" id="volumeSlider" min="0" max="100" value="40" oninput="setVolume(this.value)" title="Lautstärke">
  </div>
  <div class="sidebar-logo">Toolbox <span>BWL · Interne Revision</span></div>
  <button class="nav-item active" onclick="switchTab(&#39;schreib&#39;, this)">✦ Schreibagent</button>
  <button class="nav-item" onclick="switchTab(&#39;folien&#39;, this)">📑 Folien-Zusammenfasser</button>

  <div class="sidebar-section">Projekte</div>
  <button class="nav-item" onclick="saveProject()" id="saveProjectBtn">💾 Speichern</button>
  <button class="nav-item" onclick="showProjects()">📂 Laden</button>
  <button class="nav-item" onclick="fullReset()" style="color:#844;">🔄 Alles zurücksetzen</button>
  <div id="projectList" style="display:flex;flex-direction:column;gap:2px;margin-top:4px;"></div>
</div>

<!-- SCHREIBAGENT -->
<div class="main" id="panel-schreib" style="display:block;">
  <div class="card">
    <div class="card-title">Text umschreiben</div>
    <label>Dein Text</label>
    <textarea id="inputText" placeholder="Text hier einfügen..."></textarea>
    <hr>
    <label style="margin-bottom:6px;">Referenzdokumente (optional)</label>
    <div class="upload-zone" id="schreibUploadZone" onclick="if(!this.classList.contains(&#39;has-file&#39;)) document.getElementById(&#39;pdfUpload&#39;).click()">
      <div class="upload-zone-text" id="schreibUploadText">📄 PDFs hochladen – mehrere möglich</div>
      <input type="file" id="pdfUpload" accept=".pdf" multiple="" style="display:none" onchange="handleRefPDF(this)">
    </div>
    <div class="pdf-list" id="pdfList"></div>
    <div id="pdfAddMore" style="display:none; margin-top:6px;">
      <button class="btn-secondary" style="width:100%; font-size:12px;" onclick="document.getElementById(&#39;pdfUploadExtra&#39;).click()">+ Weiteres PDF hinzufügen</button>
      <input type="file" id="pdfUploadExtra" accept=".pdf" multiple="" style="display:none" onchange="handleRefPDF(this)">
    </div>
    <p class="status-bar" id="pdfStatus"></p>
    <hr>
    <div class="grid grid-4">
      <div class="attr-group"><label>Stil</label>
        <select id="style">
          <option value="jonas-stil">✦ Mein Stil</option>
          <option value="akademisch">Akademisch</option>
          <option value="neutral">Neutral</option>
          <option value="sachlich">Sachlich</option>
        </select>
      </div>
      <div class="attr-group"><label>Länge</label>
        <select id="length">
          <option value="gleich">Gleich</option>
          <option value="kürzer">Kürzer</option>
          <option value="ausführlicher">Länger</option>
        </select>
      </div>
      <div class="attr-group"><label>Sprache</label>
        <select id="lang">
          <option value="Deutsch">Deutsch</option>
          <option value="Englisch">Englisch</option>
        </select>
      </div>
      <div class="attr-group"><label>Zitierweise</label>
        <select id="citation">
          <option value="keine">Keine</option>
          <option value="Platzhalter">Platzhalter</option>
        </select>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-primary" id="runBtn" onclick="rewrite()">Text umschreiben</button>
      <button class="btn-secondary" id="resetSchreibBtn" onclick="resetSchreib()" style="display:none;">↺ Reset</button>
    </div>
    <p class="status-bar" id="status"></p>
  </div>
  <div class="card output-card" id="schreibOutput">
    <div class="output-toolbar">
      <div class="card-title" style="margin:0;">Ergebnis</div>
      <div style="display:flex;gap:6px;">
        <button class="btn-secondary" onclick="rewrite()">↺ Neu generieren</button>
        <button class="btn-secondary" onclick="copyEl(&#39;outputText&#39;,this)">Kopieren</button>
        <button class="btn-danger" onclick="clearSchreibOutput()">✕ Löschen</button>
      </div>
    </div>
    <div class="output-text" id="outputText"></div>
  </div>
</div>

<!-- FOLIEN ZUSAMMENFASSER -->
<div class="folien-layout" id="panel-folien" style="display:none;">
  <div class="folien-left">
    <div class="card">
      <div class="card-title">Vorlesungsfolien zusammenfassen</div>
      <div class="upload-zone" id="folienZone" onclick="if(!this.classList.contains(&#39;has-file&#39;)) document.getElementById(&#39;folienUpload&#39;).click()">
        <div class="upload-zone-text" id="folienZoneText">📑 PDF hochladen</div>
        <input type="file" id="folienUpload" accept=".pdf" style="display:none" onchange="handleFolienUpload(this)">
        <div class="upload-actions" id="folienUploadActions" style="display:none;">
          <button class="btn-secondary" onclick="event.stopPropagation(); document.getElementById(&#39;folienReplace&#39;).click()">↺ Austauschen</button>
          <button class="btn-danger" onclick="event.stopPropagation(); clearFolienUpload()">✕ Entfernen</button>
          <input type="file" id="folienReplace" accept=".pdf" style="display:none" onchange="handleFolienUpload(this)">
        </div>
      </div>
      <p class="status-bar" id="folienFileStatus"></p>

      <div id="folienRangeWrap" style="display:none;">
        <hr>
        <label style="margin-bottom:10px;">Folienbereich auswählen</label>
        <div class="range-container">
          <div class="range-labels">
            <span>Folie <strong id="rangeFromLabel">1</strong></span>

function getAPIKey() {

}
function setAPIKey(key) {
  localStorage.setItem('toolbox_api_key', key.trim());
}

function openAPIKeyModal() {
  const existing = document.getElementById('apiKeyModal');
  if (existing) { existing.remove(); return; }

  const overlay = document.createElement('div');
  overlay.id = 'apiKeyModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;';
  overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); } };

  overlay.innerHTML = `
    <div style="background:#141414;border:1px solid #2a2a2a;border-radius:14px;padding:1.5rem;width:380px;max-width:90vw;">

          style="padding:8px 14px;font-size:13px;cursor:pointer;border:1px solid #1f1f1f;border-radius:7px;background:transparent;color:#666;">Abbrechen</button>
        <button onclick="saveAPIKeyFromModal()" 
          style="padding:8px 14px;font-size:13px;cursor:pointer;border:none;border-radius:7px;background:#e0e0e0;color:#0a0a0a;font-weight:500;">Speichern</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('apiKeyModalInput')?.focus(), 100);

  // Save on Enter
  overlay.querySelector('#apiKeyModalInput').onkeydown = (e) => {
    if (e.key === 'Enter') saveAPIKeyFromModal();
  };
}

function saveAPIKeyFromModal() {
  const val = document.getElementById('apiKeyModalInput')?.value?.trim() || '';
  setAPIKey(val);
  const ok = val.length > 20;
  document.getElementById('apiKeyStatus').textContent = ok ? '✅' : '❌';
  document.getElementById('apiKeyModal')?.remove();
  if (ok) showToast('✅ API-Key gespeichert');
}

function showAPIKeyPrompt() {
  openAPIKeyModal();
}

function initAPIKeyUI() {
  const key = getAPIKey();
  document.getElementById('apiKeyStatus').textContent = key.length > 20 ? '✅' : '❌';
}

let stabBuffer = null;
let clickBuffer = null;

async function loadAudioBuffers() {
  const ctx = getAudioCtx();
  async function decodeB64(b64) {
    const bin = atob(b64);
    const ab = new ArrayBuffer(bin.length);
    const view = new Uint8Array(ab);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    return await ctx.decodeAudioData(ab);
  }
  try {
    stabBuffer = await decodeB64(STAB_B64);
    clickBuffer = await decodeB64(CLICK_B64);
  } catch(e) { console.warn('Audio load failed:', e); }
}
window.addEventListener('load', () => { loadAudioBuffers(); renderSidebarProjects(); initAPIKeyUI(); });

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function setVolume(val) {
  masterVolume = val / 100;
  muted = masterVolume === 0;
  const icon = document.getElementById('volIcon');
  if (masterVolume === 0) icon.textContent = '🔇';
  else if (masterVolume < 0.4) icon.textContent = '🔉';
  else icon.textContent = '🔊';
}

function toggleMute() {
  const slider = document.getElementById('volumeSlider');
  if (!muted) {
    prevVolume = masterVolume;
    masterVolume = 0; muted = true;
    slider.value = 0;
    document.getElementById('volIcon').textContent = '🔇';
  } else {
    masterVolume = prevVolume || 0.4; muted = false;
    slider.value = masterVolume * 100;
    document.getElementById('volIcon').textContent = masterVolume < 0.4 ? '🔉' : '🔊';
  }
}

// Single typewriter key click
function playKeyClick(pitch = 1.0) {
  if (muted || masterVolume === 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  if (clickBuffer) {
    const src = ctx.createBufferSource();
    src.buffer = clickBuffer;
    src.playbackRate.value = 1.0; // fixed pitch, no variation
    const gain = ctx.createGain();
    gain.gain.value = masterVolume * 0.22; // quieter
    src.connect(gain); gain.connect(ctx.destination);
    src.start(now);
  } else {
    const bufLen = Math.floor(ctx.sampleRate * 0.018);
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / ctx.sampleRate;
      d[i] = (Math.random() * 2 - 1) * Math.exp(-t * 700) * 0.7;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const gain = ctx.createGain(); gain.gain.value = masterVolume * 0.15;
    src.connect(gain); gain.connect(ctx.destination); src.start(now);
  }
}

function playCarriageReturn() {
  if (muted || masterVolume === 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  // Quick synthetic sweep as line-end sound
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, now);
  osc.frequency.exponentialRampToValueAtTime(2400, now + 0.04);
  osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
  gain.gain.setValueAtTime(masterVolume * 0.18, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.1);
}

function startTypewriter() {
  stopTypewriter();
  let charCount = 0;
  function scheduleNextKey() {
    if (!typeInterval) return;
    const burstSize = Math.floor(Math.random() * 4) + 2;
    let delay = 0;
    for (let i = 0; i < burstSize; i++) {
      const keyDelay = delay + Math.random() * 22 + 18;
      setTimeout(() => {
        if (!typeInterval) return;
        playKeyClick(); // fixed pitch, consistent sound
        charCount++;
        if (charCount % (Math.floor(Math.random() * 28) + 38) === 0) {
          setTimeout(playCarriageReturn, 8);
        }
      }, keyDelay);
      delay = keyDelay;
    }
    typeInterval = setTimeout(scheduleNextKey, delay + 48 + Math.random() * 95);
  }
  typeInterval = setTimeout(scheduleNextKey, 10);
}

function stopTypewriter() {
  if (typeInterval) { clearTimeout(typeInterval); typeInterval = null; }
}



// Alien completion fanfare
function playBell() {
  if (muted || masterVolume === 0) return;
  const ctx = getAudioCtx();
  [440, 660, 880, 1320].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = i % 2 === 0 ? 'square' : 'sine';
    const t = ctx.currentTime + i * 0.08;
    osc.frequency.setValueAtTime(freq * 0.5, t);
    osc.frequency.exponentialRampToValueAtTime(freq, t + 0.05);
    gain.gain.setValueAtTime(masterVolume * 0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.55);
  });
}

// KASTLE stab – plays when a block is done
function playSlideDone() {
  if (muted || masterVolume === 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  if (stabBuffer) {
    const src = ctx.createBufferSource();
    src.buffer = stabBuffer;
    src.playbackRate.value = 1.0;
    const gain = ctx.createGain();
    gain.gain.value = masterVolume * 0.7;
    src.connect(gain); gain.connect(ctx.destination);
    src.start(now);
  } else {
    // Fallback blip
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(900, now + 0.05);
    gain.gain.setValueAtTime(masterVolume * 0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.12);
  }
}

// Save/load pop
function playPop() {
  if (muted || masterVolume === 0) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, now);
  osc.frequency.exponentialRampToValueAtTime(700, now + 0.08);
  gain.gain.setValueAtTime(masterVolume * 0.2, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.15);
}

function getProjects() {
  try { return JSON.parse(localStorage.getItem('toolbox_projects') || '{}'); } catch(e) { return {}; }
}
function saveProjects(projects) {
  try { localStorage.setItem('toolbox_projects', JSON.stringify(projects)); } catch(e) {
    alert('Speichern fehlgeschlagen – localStorage möglicherweise voll.');
  }
}

function saveProject() {
  const items = document.querySelectorAll('.slide-item:not(.orga), .summary-block');
  if (!items.length) {
    showToast('⚠ Noch nichts zum Speichern – starte zuerst die Generierung.');
    return;
  }

  const isRunning = folienRunning;
  const defaultName = currentProject || document.getElementById('folienZoneText').textContent.replace('✓ ','').split('–')[0].trim() || 'Neues Projekt';
  const name = prompt(`Projektname:${isRunning ? '\n(Zwischenstand – läuft noch)' : ''}`, defaultName);
  if (!name) return;

  const blocks = Array.from(items).map(el => ({
    label: el.querySelector('.slide-num, .summary-label')?.textContent || '',
    tag: el.querySelector('.slide-tag')?.textContent || '',
    bullets: Array.from(el.querySelectorAll('.bullet-point')).map(b => b.textContent.trim()),
    text: el.querySelector('.slide-text,.summary-text')?.textContent || '',
    isSummary: el.classList.contains('summary-block'),
    topic: el.dataset.topic || ''
  }));

  const project = {
    name,
    date: new Date().toLocaleDateString('de-DE'),
    partial: isRunning,
    fileName: document.getElementById('folienZoneText').textContent.replace('✓ ',''),
    modus: document.getElementById('folienModus')?.value || '',
    detail: document.getElementById('folienDetail')?.value || '',
    lang: document.getElementById('folienLang')?.value || '',
    rangeFrom: document.getElementById('rangeFrom')?.value || '1',
    rangeTo: document.getElementById('rangeTo')?.value || '',
    blocks,
    topics: allTopics
  };

  const projects = getProjects();
  // If same name exists, overwrite it
  const existingId = Object.keys(projects).find(id => projects[id].name === name);
  const id = existingId || Date.now().toString();
  projects[id] = project;
  saveProjects(projects);
  currentProject = name;
  renderSidebarProjects();
  showToast(isRunning ? `💾 Zwischenstand gespeichert (${blocks.length} Blöcke)` : '✓ Gespeichert');
  playPop();
}

function showProjects() {
  const projects = getProjects();
  const ids = Object.keys(projects);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const listHTML = ids.length === 0
    ? '<div class="modal-empty">Noch keine Projekte gespeichert.</div>'
    : ids.map(id => {
        const p = projects[id];
        return `<div class="project-list-item" onclick="loadProject('${id}'); document.querySelector('.modal-overlay').remove();">
          <div class="project-list-info">
            <div class="project-list-name">📁 ${p.name}</div>
            <div class="project-list-meta">${p.fileName || ''} · ${p.blocks?.length || 0} Blöcke · ${p.date}</div>
          </div>
          <button class="project-list-del" onclick="event.stopPropagation(); deleteProject('${id}', this.closest('.project-list-item'))">✕</button>
        </div>`;
      }).join('');

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">📂 Gespeicherte Projekte</div>
      ${listHTML}
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Schließen</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function loadProject(id) {
  const projects = getProjects();
  const p = projects[id];
  if (!p) return;

  // Switch to folien tab
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('.nav-item:nth-child(3)').classList.add('active');
  document.getElementById('panel-schreib').style.display = 'none';
  document.getElementById('panel-folien').style.display = 'flex';

  // Full reset first
  resetFolienResults();

  // Restore upload zone UI (show as if file loaded, but allow re-upload)
  const zone = document.getElementById('folienZone');
  zone.classList.add('has-file');
  // Make zone clickable for re-upload
  zone.onclick = (e) => {
    if (!e.target.closest('.upload-actions')) document.getElementById('folienUpload').click();
  };
  document.getElementById('folienZoneText').textContent = `✓ ${p.fileName} (gespeichertes Projekt)`;
  document.getElementById('folienUploadActions').style.display = 'flex';

  // Restore slider if page count known
  const totalPages = p.blocks.length > 0
    ? Math.max(...p.blocks.filter(b=>!b.isSummary).map(b => parseInt(b.label.match(/\d+/)?.[0]||0)).filter(Boolean))
    : 100;
  const rangeWrap = document.getElementById('folienRangeWrap');
  rangeWrap.style.display = 'block';
  const rf = document.getElementById('rangeFrom'), rt = document.getElementById('rangeTo');
  rf.min = rt.min = 1;
  rf.max = rt.max = Math.max(totalPages, parseInt(p.rangeTo)||totalPages);
  rf.value = p.rangeFrom || 1;
  rt.value = p.rangeTo || Math.max(totalPages, 100);
  updateRange();

  // Restore modus/detail/lang settings
  if (p.modus) document.getElementById('folienModus').value = p.modus;
  if (p.detail) document.getElementById('folienDetail').value = p.detail;
  if (p.lang) document.getElementById('folienLang').value = p.lang;

  // Rebuild slides
  const container = document.getElementById('slidesContainer');
  document.getElementById('slidesResults').style.display = 'block';

  p.blocks.forEach(block => {
    const div = document.createElement('div');
    div.className = block.isSummary ? 'summary-block' : 'slide-item';
    div.dataset.topic = block.topic || '';
    if (block.isSummary) {
      div.innerHTML = `<div class="summary-label">🗂 Gesamtzusammenfassung</div><div class="bullet-list">${block.bullets.map(b=>`<div class="bullet-point">${b}</div>`).join('')}</div><div class="slide-chat-hint">💬 Anklicken zum Fragen stellen</div>`;
    } else {
      const tagClass = block.tag === 'Grob' ? 'slide-tag grob-tag' : 'slide-tag';
      div.innerHTML = `<div class="slide-meta"><span class="slide-num">${block.label}</span><span class="${tagClass}">${block.tag}</span></div><div class="bullet-list">${block.bullets.map(b=>`<div class="bullet-point">${b}</div>`).join('')}</div><div class="slide-chat-hint">💬 Anklicken zum Fragen stellen</div>`;
    }
    div.onclick = () => openChat(div);
    container.appendChild(div);
  });

  // Restore topics if available
  if (p.topics && p.topics.length) {
    allTopics = p.topics;
    topicsGenerated = true;
    allTopics.forEach((topic, ti) => {
      const firstMatch = Array.from(container.querySelectorAll('.slide-item, .summary-block')).find(el => el.dataset.topic == ti);
      if (firstMatch) {
        const h = document.createElement('div');
        h.className = 'topic-heading';
        h.dataset.topicIdx = ti;
        h.textContent = topic.thema;
        h.id = `topic-heading-${ti}`;
        firstMatch.parentNode.insertBefore(h, firstMatch);
      }
    });
  }

  document.getElementById('resultsCount').textContent = `${p.blocks.filter(b=>!b.isSummary).length} Blöcke geladen${p.partial ? ' (Zwischenstand)' : ''}`;
  currentProject = p.name;
  renderSidebarProjects(id);
  showToast(`✓ "${p.name}" geladen`);
  playPop();
}

// ORGA - only exact orga slides, not content slides that mention these words in passing
const orgaKW = [
  'relevant documents can be found in moodle',
  'important dates',
  'guest lecture',
  'participating in workshops allows',
  'lecture structure',
  'performance requirements of the lecture',
  'introduction of myself',
  'introduction of the chair',
  'introduction of chair',
  'agenda',
  'horváth',
  '© horváth',
  'workshop · mana',
];
function isOrga(text, wc) {
  if (wc < 8) return true;
  const tl = text.toLowerCase();
  // Only exact multi-word orga phrases, not single generic words
  return orgaKW.some(k => tl.includes(k));
}

// SCHREIBAGENT PDF
async function handleRefPDF(input) {
  const files = Array.from(input.files);
  document.getElementById('pdfStatus').textContent = 'Wird gelesen...';
  for (const file of files) {
    if (pdfDocs.find(d => d.name === file.name)) continue;
    try {
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const pg = await pdf.getPage(i);
        const c = await pg.getTextContent();
        pages.push({ page: i, text: c.items.map(x => x.str).join(' ').trim() });
      }
      pdfDocs.push({ name: file.name, pages, totalPages: pdf.numPages, fromPage: 1, toPage: pdf.numPages, rangeOpen: false });
    } catch(e) {}
  }
  renderPDFList();
  document.getElementById('pdfStatus').textContent = pdfDocs.length > 0 ? `${pdfDocs.length} Dokument(e) geladen.` : '';
  if (pdfDocs.length > 0) {
    document.getElementById('schreibUploadZone').classList.add('has-file');
    document.getElementById('schreibUploadText').textContent = `${pdfDocs.length} PDF(s) geladen`;
    document.getElementById('pdfAddMore').style.display = 'block';
  }
  input.value = '';
}

function renderPDFList() {
  document.getElementById('pdfList').innerHTML = pdfDocs.map((d, i) => `
    <div class="pdf-item-wrap">
      <div class="pdf-item ${d.rangeOpen ? 'range-open' : ''}">
        <span title="${d.name}">📄 ${d.name.length > 30 ? d.name.slice(0,28)+'…' : d.name} <span style="color:#333;">(${d.totalPages}S.)</span></span>
        <div class="pdf-item-actions">
          <button class="pdf-range-toggle" onclick="togglePDFRange(${i})">Seiten ${d.rangeOpen ? '▴' : '▾'}</button>
          <button class="pdf-replace" onclick="document.getElementById('pdfReplace_${i}').click()" title="Austauschen">↺</button>
          <input type="file" id="pdfReplace_${i}" accept=".pdf" style="display:none" onchange="doReplacePDF(${i}, this)">
          <button class="pdf-remove" onclick="removePDF(${i})" title="Entfernen">✕</button>
        </div>
      </div>
      <div class="pdf-item-range ${d.rangeOpen ? 'open' : ''}">
        <div class="range-labels">
          <span>Seite <strong id="pdfFrom_${i}">${d.fromPage}</strong></span>
          <span>bis Seite <strong id="pdfTo_${i}">${d.toPage}</strong></span>
        </div>
        <div class="range-track">
          <div class="range-selected" id="pdfRangeSelected_${i}" style="left:0%;width:100%"></div>
          <input type="range" min="1" max="${d.totalPages}" value="${d.fromPage}" oninput="updatePDFRange(${i},'from',this.value)">
          <input type="range" min="1" max="${d.totalPages}" value="${d.toPage}" oninput="updatePDFRange(${i},'to',this.value)">
        </div>
        <div style="font-size:12px;color:#444;" id="pdfRangeInfo_${i}">${d.fromPage===1&&d.toPage===d.totalPages?'Alle Seiten':'Seiten '+d.fromPage+'–'+d.toPage}</div>
      </div>
    </div>`).join('');
}
function togglePDFRange(i) { pdfDocs[i].rangeOpen = !pdfDocs[i].rangeOpen; renderPDFList(); }
async function doReplacePDF(i, input) {
  const file = input.files[0]; if (!file) return;
  try {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    const pages = [];
    for (let j = 1; j <= pdf.numPages; j++) {
      const pg = await pdf.getPage(j);
      const c = await pg.getTextContent();
      pages.push({ page: j, text: c.items.map(x => x.str).join(' ').trim() });
    }
    pdfDocs[i] = { name: file.name, pages, totalPages: pdf.numPages, fromPage: 1, toPage: pdf.numPages, rangeOpen: false };
    renderPDFList();
  } catch(e) {}
  input.value = '';
}
function updatePDFRange(i, type, val) {
  val = parseInt(val);
  if (type === 'from') pdfDocs[i].fromPage = val; else pdfDocs[i].toPage = val;
  const f = Math.min(pdfDocs[i].fromPage, pdfDocs[i].toPage);
  const t = Math.max(pdfDocs[i].fromPage, pdfDocs[i].toPage);
  const max = pdfDocs[i].totalPages;
  const pf = ((f-1)/(max-1||1))*100, pt = ((t-1)/(max-1||1))*100;
  document.getElementById(`pdfFrom_${i}`).textContent = f;
  document.getElementById(`pdfTo_${i}`).textContent = t;
  document.getElementById(`pdfRangeSelected_${i}`).style.cssText = `left:${pf}%;width:${pt-pf}%`;
  document.getElementById(`pdfRangeInfo_${i}`).textContent = f===1&&t===max ? 'Alle Seiten' : `Seiten ${f}–${t}`;
}
function removePDF(i) {
  pdfDocs.splice(i, 1); renderPDFList();
  if (pdfDocs.length === 0) {
    document.getElementById('schreibUploadZone').classList.remove('has-file');
    document.getElementById('schreibUploadText').textContent = '📄 PDFs hochladen – mehrere möglich';
    document.getElementById('pdfAddMore').style.display = 'none';
  }
  document.getElementById('pdfStatus').textContent = pdfDocs.length > 0 ? `${pdfDocs.length} Dokument(e) geladen.` : '';
}

// FOLIEN UPLOAD
async function handleFolienUpload(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('folienFileStatus').textContent = 'Wird gelesen...';
  try {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    folienPages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const pg = await pdf.getPage(i);
      const c = await pg.getTextContent();
      const text = c.items.map(x => x.str).join(' ').trim();
      folienPages.push({ page: i, text, wc: text.split(/\s+/).filter(Boolean).length });
    }
    document.getElementById('folienZone').classList.add('has-file');
    document.getElementById('folienZoneText').textContent = `✓ ${file.name} – ${pdf.numPages} Folien`;
    document.getElementById('folienUploadActions').style.display = 'flex';
    document.getElementById('folienFileStatus').textContent = `${pdf.numPages} Folien erkannt.`;
    document.getElementById('folienRangeWrap').style.display = 'block';
    const rf = document.getElementById('rangeFrom'), rt = document.getElementById('rangeTo');
    rf.min = rt.min = 1; rf.max = rt.max = pdf.numPages; rf.value = 1; rt.value = pdf.numPages;
    updateRange();
  } catch(e) { document.getElementById('folienFileStatus').textContent = 'Fehler beim Lesen.'; }
  input.value = '';
}

function clearFolienUpload() {
  folienPages = [];
  document.getElementById('folienZone').classList.remove('has-file');
  document.getElementById('folienZoneText').textContent = '📑 PDF hochladen';
  document.getElementById('folienUploadActions').style.display = 'none';
  document.getElementById('folienRangeWrap').style.display = 'none';
  document.getElementById('folienFileStatus').textContent = '';
  resetFolienResults();
}

function updateRange() {
  const from = parseInt(document.getElementById('rangeFrom').value);
  const to = parseInt(document.getElementById('rangeTo').value);
  const max = parseInt(document.getElementById('rangeFrom').max);
  const f = Math.min(from, to), t = Math.max(from, to);
  document.getElementById('rangeFromLabel').textContent = f;
  document.getElementById('rangeToLabel').textContent = t;
  const pf = ((f-1)/(max-1||1))*100, pt = ((t-1)/(max-1||1))*100;
  document.getElementById('rangeSelected').style.left = pf + '%';
  document.getElementById('rangeSelected').style.width = (pt - pf) + '%';
  const count = t - f + 1;
  document.getElementById('rangeInfo').textContent = count === max ? 'Alle Folien ausgewählt' : `${count} Folie${count!==1?'n':''} ausgewählt (${f}–${t})`;
}

function scoreRelevance(text, wc) {
  let score = 0;
  if (wc > 80) score += 3; else if (wc > 40) score += 2; else if (wc > 20) score += 1;
  ['definition','konzept','modell','theorie','framework','methode','analyse','ergebnis','fazit','zusammenfassung','kritisch','bewertung','funktion','prozess','strategie','controlling','revision','blockchain','digitalisierung','audit'].forEach(k => { if (text.toLowerCase().includes(k)) score++; });
  return score;
}

function groupByTheme(slides) {
  const blocks = []; let cur = [];
  for (const slide of slides) {
    const t = slide.text.toLowerCase();
    const cont = cur.length > 0 && (t.includes('(1/') || t.includes('(2/') || t.includes('(3/') || t.includes('(4/'));
    if (cont && cur.length < 4) { cur.push(slide); } else { if (cur.length) blocks.push(cur); cur = [slide]; }
  }
  if (cur.length) blocks.push(cur);
  return blocks;
}

// SUMMARIZE
async function summarizeSlides() {
  if (!folienPages.length) { document.getElementById('folienStatus').textContent = 'Bitte zuerst eine Datei hochladen.'; return; }
  if (!getAPIKey()) { document.getElementById('folienStatus').textContent = '⚠ API-Key fehlt – bitte oben links eintragen.'; showAPIKeyPrompt(); return; }

  const detail = document.getElementById('folienDetail').value;
  const lang = document.getElementById('folienLang').value;
  const gesamt = document.getElementById('folienGesamt').value;
  const modus = document.getElementById('folienModus').value;
  const fromVal = parseInt(document.getElementById('rangeFrom').value) || 1;
  const toVal = parseInt(document.getElementById('rangeTo').value) || folienPages.length;
  const rangeFrom = Math.min(fromVal, toVal);
  const rangeTo = Math.max(fromVal, toVal);
  const filteredPages = folienPages.filter(p => p.page >= rangeFrom && p.page <= rangeTo);

  document.getElementById('folienStatus').textContent = `${filteredPages.length} Folien gefunden (${rangeFrom}–${rangeTo})...`;

  const btn = document.getElementById('folienBtn');
  btn.textContent = '⏹ Stoppen'; btn.classList.add('running');
  folienRunning = true;
  document.getElementById('pauseBtn').style.display = 'inline-block';
  document.getElementById('slidesResults').style.display = 'none';
  document.getElementById('slidesContainer').innerHTML = '';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resetFolienBtn').style.display = 'none';
  document.getElementById('folienStatus').textContent = '';

  const detailMap = { kompakt: '3-4 Bullet Points – nur das Wesentliche.', mittel: '5-7 Bullet Points – Kernaussagen mit kurzem Kontext.', ausführlich: '8-10 Bullet Points – alle wichtigen Punkte erklärt.' };

  // Helper – reads current UI values so changes during pause take effect
  function getCurrentSettings() {
    return {
      detail: document.getElementById('folienDetail').value,
      lang: document.getElementById('folienLang').value,
    };
  }
  const allSummaries = [];
  const container = document.getElementById('slidesContainer');

  function renderOrgaBlock(slides) {
    const nums = slides.length === 1 ? `Folie ${slides[0].page}` : `Folien ${slides[0].page}–${slides[slides.length-1].page}`;
    const div = document.createElement('div');
    div.className = 'slide-item orga';
    div.innerHTML = `<div class="slide-meta"><span class="slide-num">${nums}</span><span class="slide-tag orga-tag">Organisatorisch</span></div><div class="slide-text" style="color:#333;font-size:12px;">Übersprungen.</div>`;
    container.appendChild(div);
    document.getElementById('slidesResults').style.display = 'block';
  }

  function renderResult(pageNums, summary, tag, rawText) {
    const arr = Array.isArray(pageNums) ? pageNums : [pageNums];
    const label = arr.length === 1 ? `Folie ${arr[0]}` : `Folien ${arr[0]}–${arr[arr.length-1]}`;
    const div = document.createElement('div');
    div.className = 'slide-item';
    div.dataset.label = label;
    div.dataset.summary = summary;
    div.dataset.raw = rawText || '';
    const tagClass = tag === 'Grob' ? 'slide-tag grob-tag' : 'slide-tag';
    const bullets = summary.split('\n').filter(l => l.trim().startsWith('•'));

    // Build empty bullet placeholders first
    const bulletHTML = bullets.map(() => `<div class="bullet-point typing"></div>`).join('');
    div.innerHTML = `<div class="slide-meta"><span class="slide-num">${label}</span><span class="${tagClass}">${tag}</span></div><div class="bullet-list" id="bl_${arr[0]}">${bulletHTML}</div><div class="slide-chat-hint">💬 Anklicken zum Fragen stellen</div>`;
    div.onclick = () => openChat(div);
    container.appendChild(div);
    document.getElementById('slidesResults').style.display = 'block';

    // Animate bullets typing in sequentially
    const bulletEls = div.querySelectorAll('.bullet-point.typing');
    bullets.forEach((b, i) => {
      const text = b.trim().replace(/\[Folie[\s\d,–-]+\]/g, m => `<span class="source">${m}</span>`);
      const rawText = b.trim().replace(/<[^>]+>/g, '');
      setTimeout(() => {
        const el = bulletEls[i];
        if (!el) return;
        el.classList.add('typing-cursor');
        let ci = 0;
        const speed = Math.max(12, Math.min(30, 1800 / rawText.length));
        const interval = setInterval(() => {
          ci++;
          // Show typed portion + keep source spans at end
          const plain = rawText.slice(0, ci);
          const sourceMatch = text.match(/<span class="source">.*?<\/span>/g);
          el.innerHTML = plain + (sourceMatch && ci >= rawText.indexOf('[') ? sourceMatch.join('') : '');
          if (ci >= rawText.length) {
            clearInterval(interval);
            el.innerHTML = text; // final with proper formatting
            el.classList.remove('typing', 'typing-cursor');
          }
        }, speed);
      }, i * 180);
    });
  }

  async function callAPI(prompt, maxTok) {
    startTypewriter();
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": getAPIKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: maxTok || 400, messages: [{ role: "user", content: prompt }] }),
      signal: folienAbortController.signal
    });
    const data = await res.json();
    if (data.error) { stopTypewriter(); document.getElementById('folienStatus').textContent = 'API Fehler: ' + data.error.message; throw new Error(data.error.message); }
    if (!res.ok) { stopTypewriter(); throw new Error('HTTP ' + res.status); }
    stopTypewriter();
    playSlideDone();
    return data.content?.map(b => b.text || '').join('') || '';
  }

  // Separate content/orga
  let orgaBuf = [], contentSlides = [];
  for (const slide of filteredPages) {
    if (modus === 'einzeln' || !isOrga(slide.text, slide.wc)) {
      if (orgaBuf.length) { renderOrgaBlock(orgaBuf); orgaBuf = []; }
      contentSlides.push(slide);
    } else { orgaBuf.push(slide); }
  }
  if (orgaBuf.length) renderOrgaBlock(orgaBuf);

  const total = contentSlides.length;
  let done = 0;

  function updateProgress(label, pct) {
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressPct').textContent = Math.round(pct) + '%';
    document.getElementById('progressFill').style.width = Math.round(pct) + '%';
  }

  try {
    if (modus === 'einzeln') {
      for (const slide of contentSlides) {
        if (!folienRunning) break;
        await pausePoint();
        if (!folienRunning) break;
        done++;
        const s1 = getCurrentSettings();
        updateProgress(`Folie ${slide.page} von ${rangeTo}...`, (done/total)*100);
        const summary = await callAPI(`Fasse als Bullet Points zusammen. Sprache: ${s1.lang}. ${detailMap[s1.detail]} Jeder Punkt beginnt mit "•" und endet mit [Folie ${slide.page}]. Keine Einleitung.\n\nFolieninhalt:\n${slide.text}`);
        allSummaries.push({ page: slide.page, summary });
        renderResult(slide.page, summary, 'Inhalt', slide.text);
      }
    } else if (modus === 'fokussiert') {
      for (const slide of contentSlides) {
        if (!folienRunning) break;
        await pausePoint();
        if (!folienRunning) break;
        done++;
        updateProgress(`Folie ${slide.page} von ${rangeTo}...`, (done/total)*100);
        const s2 = getCurrentSettings();
        const rel = scoreRelevance(slide.text, slide.wc);
        const isKey = rel >= 4;
        const pts = isKey ? detailMap[s2.detail] : '1-2 Bullet Points – nur Kernaussage.';
        const summary = await callAPI(`Fasse als Bullet Points zusammen. Sprache: ${s2.lang}. ${pts} Jeder Punkt beginnt mit "•" und endet mit [Folie ${slide.page}]. Keine Einleitung.\n\nFolieninhalt:\n${slide.text}`);
        allSummaries.push({ page: slide.page, summary });
        renderResult(slide.page, summary, isKey ? 'Inhalt' : 'Grob', slide.text);
      }
    } else if (modus === 'komprimiert') {
      const blocks = groupByTheme(contentSlides);
      for (const block of blocks) {
        if (!folienRunning) break;
        await pausePoint();
        if (!folienRunning) break;
        done++;
        updateProgress(`Block ${done} von ${blocks.length}...`, (done/blocks.length)*100);
        const pageNums = block.map(s => s.page);
        const s3 = getCurrentSettings(); const ref = pageNums.length === 1 ? `[Folie ${pageNums[0]}]` : `[Folien ${pageNums[0]}–${pageNums[pageNums.length-1]}]`;
        const combined = block.map(s => `[Folie ${s.page}]: ${s.text}`).join('\n\n');
        const summary = await callAPI(`Fasse als Bullet Points zusammen. Sprache: ${s3.lang}. ${detailMap[s3.detail]} Jeder Punkt mit "•", endet mit ${ref}. Keine Einleitung.\n\n${combined}`, 500);
        allSummaries.push({ page: pageNums[0], summary });
        renderResult(pageNums, summary, block.length > 1 ? `${block.length} Folien` : 'Inhalt', combined);
      }
    }

    if (folienRunning && gesamt === 'ja' && allSummaries.length > 0) {
      await pausePoint();
      updateProgress('Gesamtzusammenfassung...', 100);
      const txt = allSummaries.map(s => `[Folie ${s.page}]: ${s.summary}`).join('\n\n');
      const gt = await callAPI(`Fasse als Bullet Points. Sprache: ${lang}. Max 12 Punkte, jeder mit "•", endet mit [Folie X]. Keine Einleitung.\n\n${txt.slice(0, 6000)}`, 1000);
      const div = document.createElement('div');
      div.className = 'summary-block';
      div.dataset.label = 'Gesamtzusammenfassung';
      div.dataset.summary = gt;
      div.dataset.raw = allSummaries.map(s => s.summary).join('\n\n');
      const bullets = gt.split('\n').filter(l => l.trim().startsWith('•'));
      const bHTML = bullets.map(b => `<div class="bullet-point">${b.trim().replace(/\[Folie[\s\d,–-]+\]/g, m => `<span class="source">${m}</span>`)}</div>`).join('');
      div.innerHTML = `<div class="summary-label">🗂 Gesamtzusammenfassung</div><div class="bullet-list">${bHTML || `<div class="summary-text">${gt}</div>`}</div><div class="slide-chat-hint">💬 Anklicken zum Fragen stellen</div>`;
      div.onclick = () => openChat(div);
      container.appendChild(div);
    }
  } catch(e) {
    stopTypewriter();
    if (e.name !== 'AbortError') {
      console.error('Summarize error:', e);
      document.getElementById('folienStatus').textContent = 'Fehler: ' + e.message;
    }
  }

  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('pauseBtn').style.display = 'none';
  const orgaCount = filteredPages.filter(s => isOrga(s.text, s.wc)).length;
  document.getElementById('resultsCount').textContent = `${allSummaries.length} Blöcke · ${orgaCount} Orga-Folien übersprungen`;
  document.getElementById('folienStatus').textContent = folienRunning ? 'Fertig ✓' : `Gestoppt nach ${allSummaries.length} Blöcken.`;
  if (folienRunning) playSlideDone();
  document.getElementById('resetFolienBtn').style.display = 'inline-block';
  document.getElementById('saveProjectBtn').style.display = 'flex';
  renderSidebarProjects();
  folienRunning = false; folienPaused = false;
  btn.textContent = 'Zusammenfassen'; btn.classList.remove('running','paused'); btn.disabled = false;
}

// CHAT
function openChat(slideEl) {
  if (slideEl.classList.contains('orga')) return;
  document.querySelectorAll('.slide-item.active-chat, .summary-block.active-chat').forEach(e => e.classList.remove('active-chat'));
  slideEl.classList.add('active-chat');

  currentSlideContext = slideEl.dataset.summary || '';
  currentSlideLabel = slideEl.dataset.label || 'Folie';
  chatHistory = [];

  document.getElementById('chatPlaceholder').style.display = 'none';
  const chatActive = document.getElementById('chatActive');
  chatActive.style.display = 'flex';
  document.getElementById('chatSlideLabel').textContent = currentSlideLabel;
  document.getElementById('chatMessages').innerHTML = '';

  // Auto-explain
  addChatMsg('ai', 'thinking', '...');
  askChat(`Erkläre den Inhalt dieser Folie verständlich und ausführlich auf Deutsch. Folie: "${currentSlideLabel}"\n\nZusammenfassung:\n${currentSlideContext}`);
}

function closeChat() {
  document.querySelectorAll('.slide-item.active-chat, .summary-block.active-chat').forEach(e => e.classList.remove('active-chat'));
  document.getElementById('chatPlaceholder').style.display = 'flex';
  document.getElementById('chatActive').style.display = 'none';
  chatHistory = []; currentSlideContext = '';
}

function addChatMsg(role, type, text) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}${type === 'thinking' ? ' thinking' : ''}`;
  div.id = type === 'thinking' ? 'thinkingMsg' : '';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function askChat(userPrompt) {
  const sendBtn = document.getElementById('chatSendBtn');
  sendBtn.disabled = true;
  chatRunning = true;

  const systemMsg = `Du bist ein hilfreicher Lernassistent für einen BWL-Masterstudenten (Interne Revision). Beantworte Fragen zu Vorlesungsfolien klar, präzise und auf Deutsch. Kontext – ${currentSlideLabel}:\n${currentSlideContext}`;

  chatHistory.push({ role: 'user', content: userPrompt });

  try {
    startTypewriter();
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": getAPIKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 600, system: systemMsg, messages: chatHistory })
    });
    const data = await res.json();
    stopTypewriter();
    playSlideDone();
    const reply = data.content?.map(b => b.text || '').join('') || 'Keine Antwort erhalten.';
    chatHistory.push({ role: 'assistant', content: reply });

    const thinking = document.getElementById('thinkingMsg');
    const rendered = reply
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^#{1,3} (.+)$/gm, '<div style="font-weight:600;color:#ccc;margin:6px 0 2px;">$1</div>')
      .replace(/^- (.+)$/gm, '<div style="padding-left:10px;">• $1</div>')
      .replace(/```[\s\S]*?```/g, m => `<code style="background:#0a0a0a;padding:2px 5px;border-radius:4px;font-size:12px;">${m.replace(/```\w*\n?/g,'')}</code>`)
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    if (thinking) { thinking.className = 'chat-msg ai'; thinking.innerHTML = rendered; thinking.id = ''; }
    else { const d = addChatMsg('ai', '', ''); d.innerHTML = rendered; }

    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
  } catch(e) {
    stopTypewriter();
    const thinking = document.getElementById('thinkingMsg');
    if (thinking) thinking.remove();
    addChatMsg('ai', '', 'Fehler beim Laden der Antwort.');
  }
  sendBtn.disabled = false;
  chatRunning = false;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || chatRunning) return;
  input.value = '';
  addChatMsg('user', '', text);
  addChatMsg('ai', 'thinking', '...');
  await askChat(text);
}

function clearSchreibOutput() {

  document.getElementById('outputText').textContent = '';
  document.getElementById('status').textContent = '';
  document.getElementById('resetSchreibBtn').style.display = 'none';
}
function resetSchreib() {

  document.getElementById('inputText').value = '';
}

async function rewrite() {
  if (!getAPIKey()) { document.getElementById('status').textContent = '⚠ API-Key fehlt – bitte oben links eintragen.'; showAPIKeyPrompt(); return; }
  if (schreibAbortController) schreibAbortController.abort();
  const input = document.getElementById('inputText').value.trim();
  if (!input) { document.getElementById('status').textContent = 'Bitte Text eingeben.'; return; }
  const style = document.getElementById('style').value;
  const length = document.getElementById('length').value;
  const lang = document.getElementById('lang').value;
  const citation = document.getElementById('citation').value;
  const btn = document.getElementById('runBtn');
  schreibAbortController = new AbortController();
  btn.disabled = true;
  document.getElementById('status').textContent = 'Wird umgeschrieben...';
  document.getElementById('schreibOutput').style.display = 'none';
  document.getElementById('resetSchreibBtn').style.display = 'none';
  startTypewriter();
  const lMap = { gleich: 'Länge beibehalten.', kürzer: 'Kürzer.', ausführlicher: 'Ausführlicher.' };
  const cMap = { keine: 'Keine Zitation.', Platzhalter: 'Literaturhinweise z.B. (Autor, Jahr).' };
  const jStyle = style === 'jonas-stil' ? `Persönlich-akademischer Stil: klare Sätze, Kontext vor Detail. Übergänge: dabei, zudem, infolgedessen, vor diesem Hintergrund. Nominalisierungen, Relativsätze, passive Konstruktionen. Revisionsterminologie, Prosa. Variierende Satzrhythmen, keine Floskeln.` : `Stil: ${style}, akademisch, Masterniveau.`;
  const pdfCtx = pdfDocs.length > 0 ? `\nREGELN:\n${pdfDocs.map(d => { const f = Math.min(d.fromPage,d.toPage), t = Math.max(d.fromPage,d.toPage); return `[${d.name}]: ${d.pages.filter(p=>p.page>=f&&p.page<=t).map(p=>p.text).join(' ').slice(0,1200)}`; }).join('\n')}` : '';
  const prompt = `BWL-Master Schreibassistent (Interne Revision).\n${jStyle}\nSprache: ${lang}. ${lMap[length]} ${cMap[citation]}\nNur Text ausgeben.${pdfCtx}\n\n${input}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": getAPIKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-5", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
      signal: schreibAbortController.signal
    });
    const data = await res.json();
    if (data.error) { stopTypewriter(); document.getElementById('status').textContent = 'Fehler: ' + data.error.message; }
    else {
      stopTypewriter();
      playSlideDone(); // KASTLE stab on completion
      const resultText = data.content?.map(b=>b.text||'').join('') || '';
      document.getElementById('schreibOutput').style.display = 'block';
      document.getElementById('status').textContent = 'Fertig ✓';
      document.getElementById('resetSchreibBtn').style.display = 'inline-block';
      // Animate text typing in
      const outEl = document.getElementById('outputText');
      outEl.textContent = '';
      outEl.classList.add('typing-cursor');
      let ci = 0;
      const typingSpeed = Math.max(8, Math.min(25, 3000 / resultText.length));
      const typingInterval = setInterval(() => {
        ci += Math.floor(Math.random() * 3) + 1; // type 1-3 chars at a time
        outEl.textContent = resultText.slice(0, ci);
        if (ci >= resultText.length) {
          clearInterval(typingInterval);
          outEl.textContent = resultText;
          outEl.classList.remove('typing-cursor');
        }
      }, typingSpeed);
    }
  } catch(e) { stopTypewriter(); document.getElementById('status').textContent = e.name === 'AbortError' ? 'Abgebrochen.' : 'Verbindungsfehler.'; }
  btn.disabled = false;
}

function copyEl(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
    const orig = btn.textContent; btn.textContent = 'Kopiert ✓';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// TOPIC FILTER & HEADINGS
let filterActive = false;
let topicsGenerated = false;
let allTopics = [];
let activeFilter = 'all';

async function toggleFilter() {
  filterActive = !filterActive;
  const nav = document.getElementById('topicNav');
  const btn = document.getElementById('filterBtn');

  if (!filterActive) {
    nav.style.display = 'none';
    btn.style.borderColor = '';
    btn.style.color = '';

    document.querySelectorAll('.topic-heading').forEach(h => h.classList.remove('visible'));

    return;
  }

  btn.style.borderColor = '#3a6a3a';

    await generateTopics();
  } else {
    document.querySelectorAll('.topic-heading').forEach(h => h.classList.add('visible'));

}

async function generateTopics() {
  const items = document.querySelectorAll('.slide-item:not(.orga), .summary-block');
  if (!items.length) return;

  const navItems = document.getElementById('topicNavItems');
  navItems.innerHTML = '<span style="font-size:12px;color:#444;">Themen werden erkannt...</span>';

  // Collect all summaries
  const summaries = Array.from(items).map(el => {
    const label = el.querySelector('.slide-num, .summary-label')?.textContent || '';
    const points = Array.from(el.querySelectorAll('.bullet-point')).map(p => p.textContent.trim()).join(' ');
    return { el, label, text: points };
  });

  const combined = summaries.map(s => `[${s.label}]: ${s.text.slice(0, 200)}`).join('\n');

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": getAPIKey(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5", max_tokens: 600,
        messages: [{ role: "user", content: `Analysiere diese Folien-Zusammenfassungen und erkenne 3-7 übergeordnete Themenblöcke. Weise jeder Folie ein Thema zu.

Antworte NUR als JSON-Array, kein Text davor oder danach:
[
  {"thema": "Themenname", "folien": ["Folie 23", "Folie 24", "Folie 25"]},
  ...
]

Folien:
${combined.slice(0, 4000)}` }]
      })
    });
    const data = await res.json();
    const raw = data.content?.map(b => b.text || '').join('') || '[]';
    const cleaned = raw.replace(/```json|```/g, '').trim();
    allTopics = JSON.parse(cleaned);

    // Assign topics to slide elements
    allTopics.forEach((topic, ti) => {
      topic.folien.forEach(folieLabel => {
        const el = summaries.find(s => s.label.trim() === folieLabel.trim() || s.label.includes(folieLabel.replace('Folie ','')));
        if (el) el.el.dataset.topic = ti;
      });
    });

    // Insert headings before first slide of each topic
    allTopics.forEach((topic, ti) => {
      const firstEl = summaries.find(s => s.el.dataset.topic == ti);
      if (firstEl) {
        const heading = document.createElement('div');
        heading.className = 'topic-heading visible';
        heading.dataset.topicIdx = ti;
        heading.textContent = topic.thema;
        heading.id = `topic-heading-${ti}`;
        firstEl.el.parentNode.insertBefore(heading, firstEl.el);
      }
    });

    topicsGenerated = true;
    renderTopicNav();
  } catch(e) {
    navItems.innerHTML = '<span style="font-size:12px;color:#844;">Fehler beim Erkennen der Themen.</span>';
  }
}

function renderTopicNav() {
  const navItems = document.getElementById('topicNavItems');
  const allChip = `<button class="topic-chip all ${activeFilter==='all'?'active':''}" onclick="filterByTopic('all')">Alle</button>`;
  const chips = allTopics.map((t, i) =>
    `<button class="topic-chip ${activeFilter==i?'active':''}" onclick="filterByTopic(${i})">${t.thema}</button>`
  ).join('');
  navItems.innerHTML = allChip + chips;
}

function filterByTopic(idx) {
  activeFilter = idx;
  renderTopicNav();

  const items = document.querySelectorAll('.slide-item, .summary-block, .topic-heading');
  if (idx === 'all') {
    items.forEach(el => el.style.display = '');
    document.querySelectorAll('.topic-heading').forEach(h => h.classList.add('visible'));
    return;
  }

  // Hide all, show matching
  document.querySelectorAll('.slide-item, .summary-block').forEach(el => {
    el.style.display = el.dataset.topic == idx ? '' : 'none';
  });
  document.querySelectorAll('.topic-heading').forEach(h => {
    h.style.display = h.dataset.topicIdx == idx ? '' : 'none';
  });

  // Scroll to first visible
  const first = document.querySelector(`.topic-heading[data-topic-idx="${idx}"]`);
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showAllSlides() {
  document.querySelectorAll('.slide-item, .summary-block, .topic-heading').forEach(el => { el.style.display = ''; el.style.borderColor = ''; });
  const s = document.getElementById('slideSearch');
  if (s) s.value = '';
  activeFilter = 'all';
}

// DOWNLOAD
function downloadSlides(format) {
  const items = document.querySelectorAll('.slide-item:not(.orga), .summary-block');
  let content = '';
  const title = document.getElementById('folienZoneText').textContent.replace('✓ ', '');
  const date = new Date().toLocaleDateString('de-DE');

  if (format === 'md') {
    content = `# Folien-Zusammenfassung\n**Datei:** ${title}  \n**Erstellt:** ${date}\n\n---\n\n`;
    items.forEach(el => {
      const heading = el.previousElementSibling?.classList.contains('topic-heading')
        ? `## ${el.previousElementSibling.textContent}\n\n` : '';
      const label = el.querySelector('.slide-num, .summary-label')?.textContent || '';
      const points = el.querySelectorAll('.bullet-point');
      content += `${heading}### ${label}\n`;
      if (points.length) {
        points.forEach(p => content += `- ${p.textContent.trim()}\n`);
      } else {
        content += (el.querySelector('.slide-text,.summary-text')?.textContent || '') + '\n';
      }
      content += '\n';
    });
  } else {
    content = `FOLIEN-ZUSAMMENFASSUNG\nDatei: ${title}\nErstellt: ${date}\n${'='.repeat(50)}\n\n`;
    items.forEach(el => {
      const heading = el.previousElementSibling?.classList.contains('topic-heading')
        ? `\n── ${el.previousElementSibling.textContent.toUpperCase()} ──\n\n` : '';
      const label = el.querySelector('.slide-num, .summary-label')?.textContent || '';
      const points = el.querySelectorAll('.bullet-point');
      content += `${heading}${label}\n${'─'.repeat(30)}\n`;
      if (points.length) {
        points.forEach(p => content += `• ${p.textContent.trim()}\n`);
      } else {
        content += (el.querySelector('.slide-text,.summary-text')?.textContent || '') + '\n';
      }
      content += '\n';
    });
  }

  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `zusammenfassung_${date.replace(/\./g,'-')}.${format}`;
  a.click();
  URL.revokeObjectURL(url);
}

function searchSlide(val) {
  val = val.trim();
  if (!val) { showAllSlides(); return; }

  // Parse input – support "23", "Folie 23", "23-25", "23,24,25"
  let targetNums = [];
  const cleaned = val.toLowerCase().replace('folie', '').trim();

  if (cleaned.includes('-')) {
    const [from, to] = cleaned.split('-').map(n => parseInt(n.trim()));
    if (!isNaN(from) && !isNaN(to)) {
      for (let i = from; i <= to; i++) targetNums.push(i);
    }
  } else {
    targetNums = cleaned.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
  }

  if (!targetNums.length) { showAllSlides(); return; }

  // Find and highlight matching slide
  const items = document.querySelectorAll('.slide-item:not(.orga), .summary-block');
  let found = null;
